version: "3"

services:

  api:
    build: .
    env_file:
      - .env
    ports:
      - "3001:3001"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tcm_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379 
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tcm_dev
    ports:
      - "5432:5432"
  
  redis:
    image: redis:latest 
    restart: always
    ports:
      - "6379:6379"

  pgadmin:
   image: dpage/pgadmin4
   restart: always
   ports:
     - "5050:80"
   environment:
     PGADMIN_DEFAULT_EMAIL: admin@admin.com
     PGADMIN_DEFAULT_PASSWORD: admin
   depends_on:
     - db   